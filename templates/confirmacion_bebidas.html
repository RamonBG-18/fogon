<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fogón | Confirmación de bebidas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-light">
    <header class="hero">
        <div class="hero-contenido">
            <h1 class="display-6 fw-bold">Fogón 🔥</h1>
            <p class="lead">Revisa la selección de bebidas.</p>
        </div>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="titulo-seccion">Bebidas seleccionadas</h2>
                        <div class="alert alert-info">
                            {% for nombre, cantidad in bebidas.items() %}
                            <p class="mb-2"><strong>{{ nombre }}:</strong> {{ cantidad }}</p>
                            {% endfor %}
                        </div>
                        <form method="post">
                            <button class="btn btn-pedir btn-lg w-100" type="submit">Confirmar bebidas</button>
                        </form>
                        <a class="btn btn-outline-secondary mt-3" href="{{ url_for('seleccionar_bebidas') }}">← Volver</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Fogón. Prende el carbón, nosotros ponemos la carne.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
