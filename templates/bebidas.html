<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fogón | Bebidas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-light">
    <header class="hero">
        <div class="hero-contenido">
            <h1 class="display-6 fw-bold">Fogón 🔥</h1>
            <p class="lead">Elige tus bebidas para el paquete.</p>
        </div>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="titulo-seccion">Selecciona tus bebidas</h2>
                        <form method="post">
                            {% for bebida in bebidas %}
                            <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
                                <label class="fw-semibold mb-0">{{ bebida.nombre }} <span class="precio-bebida">{{ bebida.precio }}</span></label>
                                <div class="cantidad-control">
                                    <button type="button" class="btn btn-cantidad" onclick="cambiarCantidad('{{ bebida.nombre }}', -1)">−</button>
                                    <input type="number" class="form-control text-center" id="cantidad_{{ bebida.nombre }}" name="cantidad_{{ bebida.nombre }}" value="0" min="0" max="20" readonly style="width: 70px;">
                                    <button type="button" class="btn btn-cantidad" onclick="cambiarCantidad('{{ bebida.nombre }}', 1)">+</button>
                                </div>
                            </div>
                            {% endfor %}
                            <button class="btn btn-pedir btn-lg w-100 mt-4" type="submit">Continuar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Fogón. Prende el carbón, nosotros ponemos la carne.</p>
    </footer>

    <script>
        function cambiarCantidad(nombre, delta) {
            const input = document.getElementById('cantidad_' + nombre);
            const actual = parseInt(input.value || '0', 10);
            const siguiente = Math.max(0, actual + delta);
            input.value = siguiente;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
