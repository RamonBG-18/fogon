<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fogón | Hacer Pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-light">
    <header class="hero">
        <div class="hero-contenido">
            <h1 class="display-5 fw-bold">Fogón 🔥</h1>
            <p class="lead">Tu pedido está a punto de salir a la parrilla.</p>
            <a class="btn btn-outline-light mt-3" href="{{ url_for('ver_pedidos') }}">Ver pedidos confirmados</a>
        </div>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="titulo-seccion mb-4">Completa tu pedido</h2>

                        {% if mensaje %}
                        <div class="alert alert-warning" role="alert">{{ mensaje }}</div>
                        {% endif %}

                        <form method="post" action="{{ action_url }}">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Tu nombre</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ej. Ana López" required>
                            </div>

                            <div class="mb-3">
                                <label for="metodo_pago" class="form-label">Método de pago</label>
                                <select class="form-select" id="metodo_pago" name="metodo_pago" required>
                                    <option value="">Selecciona una opción</option>
                                    <option value="Efectivo">Efectivo</option>
                                    <option value="Transferencia">Transferencia</option>
                                    <option value="Tarjeta">Tarjeta</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="telefono" class="form-label">Teléfono</label>
                                <input type="tel" class="form-control" id="telefono" name="telefono" placeholder="Ej. 5512345678" required>
                            </div>

                            <div class="mb-3">
                                <label for="domicilio" class="form-label">Domicilio</label>
                                <input type="text" class="form-control" id="domicilio" name="domicilio" placeholder="Ej. Calle 123, Colonia, Ciudad" required>
                            </div>

                            <button class="btn btn-pedir btn-lg w-100" type="submit">Continuar</button>
                        </form>

                        <div class="mt-3 d-flex flex-wrap gap-2">
                            <a class="btn btn-outline-secondary" href="{{ url_for('inicio') }}">← Volver al menú</a>
                            <a class="btn btn-outline-secondary" href="javascript:history.back()">← Atrás</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Fogón. Prende el carbón, nosotros ponemos la carne.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
